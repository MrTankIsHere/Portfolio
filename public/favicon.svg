<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="btFaviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E22227" />
      <stop offset="50%" stop-color="#C7372C" />
      <stop offset="100%" stop-color="#6C0102" />
    </linearGradient>

    <linearGradient id="btTextGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#F4F1EE" />
    </linearGradient>

    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF5257" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#0E0B0B" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Perfect Circular Base -->
  <circle cx="256" cy="256" r="256" fill="url(#btFaviconGradient)" />
  <circle cx="256" cy="256" r="238" fill="#17110F" opacity="0.88" />
  <circle cx="256" cy="256" r="200" fill="url(#innerGlow)" />

  <!-- Centered "BT" Initials Only -->
  <g font-family="'Space Grotesk', 'Arial Black', sans-serif" font-weight="900" font-size="240" text-anchor="middle" dominant-baseline="central">
    <text x="256" y="260" fill="url(#btTextGradient)" letter-spacing="-8">BT</text>
  </g>
</svg>